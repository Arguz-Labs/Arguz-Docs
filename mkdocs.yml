# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: Arguz Documentation
site_description: Kubernetes Deployment Governance & Observability Platform
site_author: Arguz Labs
site_url: https://docs.arguz.io
repo_name: Arguz-Labs/Arguz-Docs
repo_url: https://github.com/Arguz-Labs/Arguz-Docs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - toc.integrate
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.png
  favicon: assets/favicon.svg

plugins:
  - search:
      lang: en
  - tags
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
      toc_depth: 4

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Arguz-Labs
  version:
    provider: mike

extra_css:
  - assets/extra.css

copyright: Copyright &copy; 2026 Arguz Labs

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Overview: getting-started/overview.md
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - Architecture: getting-started/architecture.md
  - Arguz Agent:
      - agent/index.md
      - Agent Overview: agent/overview.md
      - Data Collection: agent/data-collection.md
      - Communication Protocols: agent/protocols.md
      - Required Permissions: agent/permissions.md
      - Agent Security: agent/security.md
      - Limitations & Scope: agent/limitations.md
  - Deployments:
      - deployments/index.md
  - Clusters:
      - clusters/index.md
  - Workloads & Services:
      - workloads/index.md
  - Revision History:
      - revisions/index.md
  - Incidents & Errors:
      - incidents/index.md
  - Root Cause Analysis:
      - rca/index.md
  - Notifications:
      - notifications/index.md
  - Policies & Governance:
      - policies/index.md
  - Integrations:
      - integrations/index.md
      - GitHub: integrations/github.md
      - ArgoCD: integrations/argocd.md
      - Google Authentication: integrations/google-auth.md
      - Azure AD: integrations/azure-ad.md
  - Administration:
      - administration/index.md
  - FAQ:
      - faq/index.md
  - Glossary: glossary.md
